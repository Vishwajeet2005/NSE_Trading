services:
  - type: web
    name: nse-trading-system
    env: python
    buildCommand: "./build.sh"
    startCommand: "uvicorn backend.api.routes:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: NODE_VERSION
        value: 20.11.0
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
    # disk:
    #   name: data
    #   mountPath: /data
    #   sizeGB: 1
